[env:ATmega32U4]
platform = atmelavr
board = micro
board_build.mcu = atmega32u4
board_build.f_cpu = 16000000UL
upload_protocol = custom
upload_command = avrdude -C ${platformio.packages_dir}/tool-avrdude/avrdude.conf -c flip1 -p m32u4 -v -u -P usb -U flash:w:$SOURCE:i
build_type = release

platform_packages =
  toolchain-atmelavr @ >=3.0.0

lib_deps =
  LUFA
  RAVA_RNG
  RAVA8_RNG

build_flags = 
  # LUFA
  -I lib
  -I include
  -D USE_LUFA_CONFIG_HEADER  
  -D F_USB=16000000UL
  -D ARCH=ARCH_AVR8
  # RAVA_RNG
  -D RNG_GEN_MAX_NBYTES_PER_CORE=1024
  # RAVA8_RNG
  -D USART_BAUD=250000